<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villa Corsu — Calendrier des réservations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <div class="cal-wrap">

      <div class="header">
        <div class="header-left">
          <div class="villa-logo">🏡</div>
          <div>
            <div class="title">Villa Corsu</div>
            <div class="subtitle">Calendrier des réservations <span class="version-badge" id="app-version">v1.0</span></div>
          </div>
        </div>
        <div class="header-right">
          <div class="view-toggle">
            <button class="vtbtn active" id="btn-cal" onclick="setView('cal')">Calendrier</button>
            <button class="vtbtn" id="btn-list" onclick="setView('list')">Liste</button>
            <a class="vtbtn" href="stats.html">Statistiques</a>
          </div>
          <div class="nav-row">
            <button class="nav-btn" onclick="changeYear(-1)">&#8249;</button>
            <span class="year-label" id="year-label">2025</span>
            <button class="nav-btn" onclick="changeYear(1)">&#8250;</button>
          </div>
          <button class="sync-btn" id="sync-btn" onclick="syncFromSheet()" title="Resynchroniser depuis Google Sheets">
            <svg id="sync-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            <span id="sync-label">Sync</span>
          </button>
        </div>
      </div>

      <div class="sync-status" id="sync-status" style="display:none"></div>
      <div class="stats-row" id="stats-row"></div>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot tenant"></div> Locataire</div>
        <div class="legend-item"><div class="legend-dot owner"></div> Propriétaire</div>
        <div class="legend-item"><div class="legend-dot free"></div> Libre</div>
        <div class="legend-item"><div class="legend-dot today-dot"></div> Aujourd'hui</div>
        <div class="legend-item"><span class="legend-icon">▶</span> Arrivée (check-in)</div>
        <div class="legend-item"><span class="legend-icon">◀</span> Départ (check-out)</div>
      </div>

      <div class="cal-view" id="cal-view">
        <div class="months-grid" id="months-grid"></div>
      </div>

      <div class="list-view" id="list-view">
        <div id="list-content"></div>
      </div>

    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <footer class="app-footer">Villa Corsu Calendar &mdash; <span id="footer-version">v1.0</span> &mdash; <a href="setup.html">Configuration synchro</a></footer>
  <script src="data.js"></script>
  <script src="calendar.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof APP_VERSION !== 'undefined') {
      const v = 'v' + APP_VERSION;
      document.getElementById('app-version').textContent = v;
      document.getElementById('footer-version').textContent = v;
      document.title = 'Villa Corsu ' + v + ' — Calendrier';
    }
  });
</script>
</body>
</html>
